name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build-scan:
    name: Build & scan (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: gateway
            context: gateway
          - name: mock-tools
            context: mock-tools
          - name: dashboard
            context: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Compute image reference (lowercase)
        id: ref
        run: |
          owner_repo="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${owner_repo}/${{ matrix.image.name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          load: true
          tags: ${{ steps.ref.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-image-${{ matrix.image.name }}

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ${{ steps.ref.outputs.image }}:${{ github.sha }}
            ${{ steps.ref.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
